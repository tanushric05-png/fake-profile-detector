<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake Profile Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Fake Profile Detection System</h1>

        <form id="profileForm">
            <input type="number" id="followers" placeholder="Number of Followers" required>
            <input type="number" id="following" placeholder="Number of Following" required>
            <input type="number" id="posts" placeholder="Number of Posts" required>
            
            <button type="submit">Check Profile</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
